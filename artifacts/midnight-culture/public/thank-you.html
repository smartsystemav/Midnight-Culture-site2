<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Midnight Culture</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #050816;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 680px;
        width: 100%;
        background: rgba(10, 14, 30, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 48px 32px;
        text-align: center;
      }
      .eyebrow {
        color: #4f74ff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 48px;
        line-height: 1;
      }
      p {
        margin: 0 0 28px;
        color: rgba(255,255,255,0.72);
        font-size: 18px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        background: #4f74ff;
        color: #fff;
        text-decoration: none;
        padding: 14px 28px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      a:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Enquiry Sent</div>
      <h1>Thank You</h1>
      <p>
        Thanks for getting in touch with Midnight Culture. We’ve received your
        enquiry and will get back to you as soon as possible.
      </p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
